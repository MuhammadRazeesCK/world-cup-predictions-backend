services:
  - type: web
    name: wc-predictions-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    preDeployCommand: npm run migrate:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
